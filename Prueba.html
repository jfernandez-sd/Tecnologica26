<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tecnológica Santa Cruz 2026 - ¡Haz que pase!</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Configuración personalizada de Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'deep-dark': '#050505',
                        'electric-blue': '#00BFFF',
                        'cyber-cyan': '#00FFFF',
                        'tech-purple': '#A855F7',
                        'tech-pink': '#EC4899',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <!-- React y ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel para compilar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body {
            background-color: #050505;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            touch-action: manipulation;
        }

        #root {
            min-height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 5px var(--tw-colors-electric-blue), 0 0 10px var(--tw-colors-electric-blue), 0 0 15px var(--tw-colors-electric-blue); }
            50% { box-shadow: 0 0 10px var(--tw-colors-cyber-cyan), 0 0 20px var(--tw-colors-cyber-cyan), 0 0 30px var(--tw-colors-cyber-cyan); }
        }

        .animate-pulse-glow {
            animation: pulse-glow 2s infinite alternate;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .animate-spin-slow {
            animation: spin 5s linear infinite;
        }

        @keyframes flash {
            0%, 100% { background-color: #050505; }
            50% { background-color: #FFFFFF; }
        }

        .animate-flash {
            animation: flash 0.1s steps(1) infinite;
        }

        .text-shadow-glow {
            text-shadow: 0 0 10px var(--tw-colors-cyber-cyan), 0 0 20px var(--tw-colors-cyber-cyan);
        }

        [data-lucide] {
            display: inline-block;
            vertical-align: middle;
            stroke-width: 2;
            stroke: currentColor;
            fill: none;
            width: 1em;
            height: 1em;
        }

        .quiz-option-item {
            @apply w-full p-4 mb-3 rounded-lg text-lg font-bold transition-all duration-300 cursor-pointer;
            @apply bg-gray-800 text-electric-blue border-2 border-electric-blue;
            list-style: none;
        }
        .quiz-option-item:hover:not(.disabled) {
            @apply bg-electric-blue text-deep-dark;
        }
        .quiz-option-item.is-selected {
            @apply border-tech-purple;
            background-color: rgba(168, 85, 247, 0.2);
        }
        .quiz-option-item.correct {
            @apply bg-green-600 border-green-600 text-white;
            box-shadow: 0 0 8px var(--tw-colors-green-600), 0 0 15px var(--tw-colors-green-500);
        }
        .quiz-option-item.incorrect {
            @apply bg-red-600 border-red-600 text-white;
            box-shadow: 0 0 8px var(--tw-colors-red-600), 0 0 15px var(--tw-colors-red-500);
        }
        .quiz-option-item.show-correct-answer {
            @apply border-green-500 text-green-500;
        }
        .quiz-option-item.disabled {
            @apply opacity-50 cursor-not-allowed;
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;
        const { createRoot } = ReactDOM;

        // Componente envoltorio para Lucide Icons en el navegador
        const LucideIcon = ({ name, size = 24, color = 'currentColor', className = '' }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide && window.lucide.createIcons) {
                    iconRef.current.innerHTML = window.lucide.icons[name] ? window.lucide.icons[name].toSvg({
                        width: size,
                        height: size,
                        stroke: color,
                        class: className
                    }) : '';
                    window.lucide.createIcons({
                        root: iconRef.current.parentNode
                    });
                }
            }, [name, size, color, className]);
            return <span ref={iconRef} className={className} data-lucide={name}></span>;
        };

        // --- Constantes Globales --- //
        const EVENT_NAME = "Tecnológica Santa Cruz 2026";
        const SLOGAN = "Haz que pase";
        const ANNIVERSARY = "15º Aniversario";
        const TARGET_ACTIVATION_DATE = new Date('2026-05-13T14:53:00+01:00'); // 14 de Mayo 2026, 17:00 (UTC+1)
        const TRIGGER_DURATION_MS = 9000;

        const QUIZ_QUESTIONS = [
            { question: "¿En qué año se celebró por primera vez Tecnológica Santa Cruz?", options: ["2011", "2006", "2016", "2021"], answer: "2011" },
            { question: "¿Qué conocido hacker y experto en ciberseguridad es famoso por llevar gorra y ha participado en el evento?", options: ["Kevin Mitnick", "Julian Assange", "Chema Alonso", "Edward Snowden"], answer: "Chema Alonso" },
            { question: "¿Cuál de estos icónicos lugares ha sido sede de Tecnológica Santa Cruz?", options: ["Auditorio de Tenerife", "Teatro Guimerá", "Recinto Ferial", "Museo de la Naturaleza y el Hombre"], answer: "Teatro Guimerá" },
            { question: "¿Qué entidad ha sido uno de los principales organizadores del evento a lo largo de los años?", options: ["Cabildo de Tenerife", "Gobierno de Canarias", "Sociedad de Desarrollo de Santa Cruz", "Universidad de La Laguna"], answer: "Sociedad de Desarrollo de Santa Cruz" },
            { question: "¿Cuál es el lema actual del evento, inspirando a la acción y la innovación?", options: ["Conecta y Avanza", "Digitaliza el Futuro", "Haz que pase", "Innovar para Crecer"], answer: "Haz que pase" },
        ];

        // --- Utilidades de Audio y Vibración --- //
        let audioContext = null;
        let oscillator = null;
        let gainNode = null;

        const initAudio = async () => {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                await audioContext.resume();
            }
            const buffer = audioContext.createBuffer(1, 1, 22050);
            const source = audioContext.createBufferSource();
            source.buffer = buffer;
            source.connect(audioContext.destination);
            source.start(0);
            source.stop(0.001);
        };

        const playTriggerSound = () => {
            if (!audioContext) return;
            if (oscillator) { oscillator.stop(); oscillator.disconnect(); }
            if (gainNode) gainNode.disconnect();

            oscillator = audioContext.createOscillator();
            gainNode = audioContext.createGain();

            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(55, audioContext.currentTime);
            oscillator.frequency.linearRampToValueAtTime(110, audioContext.currentTime + TRIGGER_DURATION_MS / 1000);

            gainNode.gain.setValueAtTime(0.5, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + TRIGGER_DURATION_MS / 1000);

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.start(audioContext.currentTime);

            setTimeout(() => {
                if (oscillator) { oscillator.stop(); oscillator.disconnect(); oscillator = null; }
                if (gainNode) { gainNode.disconnect(); gainNode = null; }
            }, TRIGGER_DURATION_MS);
        };

        const vibrateDevice = () => {
            if (navigator.vibrate) {
                navigator.vibrate([400, 100, 400, 100, 800, 100, 1200]);
                const interval = setInterval(() => {
                    navigator.vibrate([400, 100, 400, 100, 800, 100, 1200]);
                }, 3100);
                setTimeout(() => {
                    clearInterval(interval);
                    navigator.vibrate(0);
                }, TRIGGER_DURATION_MS);
            }
        };

        let wakeLock = null;
        const requestWakeLock = async () => {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                } catch (err) {
                    if (err.name !== 'NotAllowedError') {
                        console.warn(`Wake Lock error: ${err.name}, ${err.message}`);
                    }
                }
            }
        };

        const releaseWakeLock = () => {
            if (wakeLock) {
                wakeLock.release();
                wakeLock = null;
            }
        };

        // --- Componentes --- //

        const LandingScreen = ({ onConnect }) => (
            <div className="flex flex-col items-center justify-center min-h-screen w-full text-center p-8 bg-deep-dark">
                <LucideIcon name="zap" size={100} color="#00FFFF" className="mb-8 animate-pulse-glow rounded-full" />
                <h1 className="text-5xl font-black italic text-transparent bg-clip-text bg-gradient-to-r from-tech-purple to-electric-blue mb-4 leading-tight">
                    {EVENT_NAME}
                </h1>
                <h2 className="text-3xl font-bold text-electric-blue mb-8">{ANNIVERSARY}</h2>
                <button
                    onClick={onConnect}
                    className="px-10 py-5 rounded-full text-2xl font-black uppercase tracking-wide bg-gradient-to-r from-tech-purple to-electric-blue text-deep-dark hover:from-electric-blue hover:to-tech-purple transition-all duration-300 transform active:scale-95 focus:outline-none focus:ring-4 focus:ring-electric-blue focus:ring-opacity-75"
                >
                    Vincular Dispositivo
                </button>
            </div>
        );

        const ConnectingScreen = () => (
            <div className="flex flex-col items-center justify-center min-h-screen w-full bg-deep-dark text-center p-8">
                <LucideIcon name="loader" size={80} color="#00BFFF" className="mb-6 animate-spin-slow" />
                <h2 className="text-4xl font-bold text-electric-blue animate-pulse-glow">Sincronizando Nodo...</h2>
            </div>
        );

        const QuizGame = ({ onComplete }) => {
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [feedback, setFeedback] = useState(null);
            const [score, setScore] = useState(0);
            const [showResults, setShowResults] = useState(false);

            const currentQuestion = QUIZ_QUESTIONS[currentQuestionIndex];

            const handleAnswer = (answer) => {
                setSelectedAnswer(answer);
                if (answer === currentQuestion.answer) {
                    setFeedback('correct');
                    setScore(prev => prev + 1);
                } else {
                    setFeedback('incorrect');
                }
                setTimeout(() => {
                    setSelectedAnswer(null);
                    setFeedback(null);
                    if (currentQuestionIndex < QUIZ_QUESTIONS.length - 1) {
                        setCurrentQuestionIndex(prev => prev + 1);
                    } else {
                        setShowResults(true);
                        setTimeout(onComplete, 3000);
                    }
                }, 1500);
            };

            if (showResults) {
                return (
                    <div className="flex flex-col items-center justify-center text-center w-full max-w-md mx-auto p-4">
                        <h3 className="text-3xl font-black text-cyber-cyan mb-4">¡Quiz Completado!</h3>
                        <p className="text-2xl text-electric-blue">Tu puntuación: {score} / {QUIZ_QUESTIONS.length}</p>
                        <p className="mt-8 text-xl text-gray-400 italic">Volviendo a la espera...</p>
                    </div>
                );
            }

            return (
                <div className="flex flex-col items-center justify-center text-center w-full max-w-md mx-auto p-4">
                    <p className="text-sm text-gray-500 mb-2">Pregunta {currentQuestionIndex + 1} de {QUIZ_QUESTIONS.length}</p>
                    <h3 className="text-2xl font-bold text-electric-blue mb-6 leading-relaxed">{currentQuestion.question}</h3>
                    <ul className="w-full space-y-3 p-0">
                        {currentQuestion.options.map((option, index) => (
                            <li
                                key={index}
                                onClick={() => selectedAnswer === null && handleAnswer(option)}
                                className={`quiz-option-item
                                    ${selectedAnswer === option ? 'is-selected' : ''}
                                    ${selectedAnswer === option && feedback === 'correct' ? 'correct' : ''}
                                    ${selectedAnswer === option && feedback === 'incorrect' ? 'incorrect' : ''}
                                    ${selectedAnswer !== null && option === currentQuestion.answer && selectedAnswer !== option ? 'show-correct-answer' : ''}
                                    ${selectedAnswer !== null ? 'disabled' : ''}
                                `}
                            >
                                {option}
                            </li>
                        ))}
                    </ul>
                </div>
            );
        };

        const calculateTimeRemaining = (targetDate) => {
            if (!targetDate) return { days: 0, hours: 0, minutes: 0, seconds: 0, total: 0 };
            const now = new Date();
            const difference = targetDate.getTime() - now.getTime();

            if (difference <= 0) return { days: 0, hours: 0, minutes: 0, seconds: 0, total: 0 };

            return {
                total: difference,
                days: Math.floor(difference / (1000 * 60 * 60 * 24)),
                hours: Math.floor((difference / (1000 * 60 * 60)) % 24),
                minutes: Math.floor((difference / 1000 / 60) % 60),
                seconds: Math.floor((difference / 1000) % 60)
            };
        };

        const WaitingScreen = ({ onCountdownEnd }) => {
            const [quizActive, setQuizActive] = useState(false);
            const [timeRemaining, setTimeRemaining] = useState(calculateTimeRemaining(TARGET_ACTIVATION_DATE));

            useEffect(() => {
                if (quizActive) return;

                const timer = setInterval(() => {
                    const newTimeRemaining = calculateTimeRemaining(TARGET_ACTIVATION_DATE);
                    setTimeRemaining(newTimeRemaining);

                    if (newTimeRemaining.total <= 0) {
                        clearInterval(timer);
                        onCountdownEnd();
                    }
                }, 1000);

                return () => clearInterval(timer);
            }, [quizActive, onCountdownEnd]);

            return (
                <div className="flex flex-col items-center justify-between min-h-screen w-full p-6 md:p-8 bg-deep-dark">
                    <div className="text-center mt-4">
                        <h2 className="text-4xl font-black italic text-transparent bg-clip-text bg-gradient-to-r from-tech-purple to-electric-blue mb-4 leading-tight">{SLOGAN}</h2>
                        <p className="text-xl text-electric-blue">El momento está por llegar...</p>
                    </div>

                    <div className="flex flex-col items-center space-y-6 my-auto w-full py-6">
                        {!quizActive ? (
                            timeRemaining.total > 0 ? (
                                <div className="flex flex-col justify-center items-center space-y-4 md:space-y-6">
                                    {timeRemaining.days > 0 && (
                                        <div className="flex flex-col items-center">
                                            <span className="text-5xl md:text-7xl lg:text-8xl font-extrabold text-cyber-cyan text-shadow-glow leading-none">{String(timeRemaining.days).padStart(2, '0')}</span>
                                            <span className="text-sm md:text-xl font-bold text-electric-blue uppercase tracking-widest mt-1">Días</span>
                                        </div>
                                    )}
                                    {(timeRemaining.days > 0 || timeRemaining.hours > 0) && (
                                        <div className="flex flex-col items-center">
                                            <span className="text-5xl md:text-7xl lg:text-8xl font-extrabold text-cyber-cyan text-shadow-glow leading-none">{String(timeRemaining.hours).padStart(2, '0')}</span>
                                            <span className="text-sm md:text-xl font-bold text-electric-blue uppercase tracking-widest mt-1">Horas</span>
                                        </div>
                                    )}
                                    {(timeRemaining.days > 0 || timeRemaining.hours > 0 || timeRemaining.minutes > 0) && (
                                        <div className="flex flex-col items-center">
                                            <span className="text-5xl md:text-7xl lg:text-8xl font-extrabold text-cyber-cyan text-shadow-glow leading-none">{String(timeRemaining.minutes).padStart(2, '0')}</span>
                                            <span className="text-sm md:text-xl font-bold text-electric-blue uppercase tracking-widest mt-1">Minutos</span>
                                        </div>
                                    )}
                                    <div className="flex flex-col items-center">
                                        <span className="text-5xl md:text-7xl lg:text-8xl font-extrabold text-cyber-cyan text-shadow-glow leading-none">{String(timeRemaining.seconds).padStart(2, '0')}</span>
                                        <span className="text-sm md:text-xl font-bold text-electric-blue uppercase tracking-widest mt-1">Segundos</span>
                                    </div>
                                </div>
                            ) : (
                                <h3 className="text-4xl font-extrabold text-cyber-cyan animate-pulse-glow">¡ACTIVANDO!</h3>
                            )
                        ) : null}

                        {quizActive ? (
                            <QuizGame onComplete={() => setQuizActive(false)} />
                        ) : (
                            <button
                                onClick={() => setQuizActive(true)}
                                className="px-6 py-3 mt-6 rounded-full text-lg font-bold bg-gradient-to-r from-tech-purple to-electric-blue text-deep-dark hover:from-electric-blue hover:to-tech-purple transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-electric-blue focus:ring-opacity-75"
                            >
                                Jugar Quiz ({QUIZ_QUESTIONS.length} preguntas)
                            </button>
                        )}
                    </div>

                    <div className="text-gray-600 text-sm text-center mb-4">
                        <p>Esperando la señal de activación...</p>
                    </div>
                </div>
            );
        };

        const ActivationState = ({ onComplete }) => {
            const [isFlashing, setIsFlashing] = useState(true);

            useEffect(() => {
                const flashInterval = setInterval(() => setIsFlashing(prev => !prev), 100);
                vibrateDevice();
                playTriggerSound();

                const timeout = setTimeout(() => {
                    clearInterval(flashInterval);
                    setIsFlashing(false);
                    onComplete();
                }, TRIGGER_DURATION_MS);

                return () => {
                    clearInterval(flashInterval);
                    clearTimeout(timeout);
                };
            }, [onComplete]);

            const backgroundColor = isFlashing ? 'bg-white' : 'bg-deep-dark';

            return (
                <div className={`flex items-center justify-center min-h-screen w-full ${backgroundColor} transition-colors duration-50`}>
                </div>
            );
        };

        const App = () => {
            const [screen, setScreen] = useState('landing');

            useEffect(() => {
                if (screen === 'waiting' || screen === 'activating') {
                    requestWakeLock();
                } else {
                    releaseWakeLock();
                }
            }, [screen]);

            useEffect(() => {
                const handleVisibilityChange = () => {
                    if (document.visibilityState === 'visible' && (screen === 'waiting' || screen === 'activating')) {
                        requestWakeLock();
                    }
                };
                document.addEventListener('visibilitychange', handleVisibilityChange);
                return () => document.removeEventListener('visibilitychange', handleVisibilityChange);
            }, [screen]);

            const handleConnect = useCallback(async () => {
                setScreen('connecting');
                await initAudio();
                setTimeout(() => setScreen('waiting'), 2000);
            }, []);

            const handleCountdownEnd = useCallback(() => {
                setScreen('activating');
            }, []);

            const handleActivationComplete = useCallback(() => {
                setScreen('waiting');
            }, []);

            return (
                <div className="min-h-screen w-full overflow-x-hidden bg-deep-dark">
                    {screen === 'landing' && <LandingScreen onConnect={handleConnect} />}
                    {screen === 'connecting' && <ConnectingScreen />}
                    {screen === 'waiting' && <WaitingScreen onCountdownEnd={handleCountdownEnd} />}
                    {screen === 'activating' && <ActivationState onComplete={handleActivationComplete} />}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);

        // Inicializar iconos de Lucide (por si queda alguno suelto, aunque el componente envoltorio lo gestiona)
        window.addEventListener('load', () => {
             if(window.lucide) {
                 window.lucide.createIcons();
             }
        });
    </script>
</body>
</html>
